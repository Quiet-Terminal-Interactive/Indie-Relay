<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password | Indie Relay</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>

<header id="nav" role="banner"></header>

<main style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 64px);padding:var(--space-8) var(--space-6)">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:var(--space-8)">
      <img src="/images/IndieRelayLogo.png" alt="Indie Relay" style="height:48px;width:auto;margin:0 auto var(--space-4);display:block">
      <h1 style="font-size:var(--text-2xl)">Set a new password</h1>
    </div>

    <div id="invalid-card" class="card" style="display:none;text-align:center">
      <div style="font-size:2rem;margin-bottom:var(--space-4)" aria-hidden="true">⚠️</div>
      <h2 style="font-size:var(--text-xl);margin-bottom:var(--space-2)">Link invalid or expired</h2>
      <p style="color:var(--ir-text-muted);font-size:var(--text-sm)">This reset link has already been used or has expired. Reset links are valid for 1 hour.</p>
      <a href="/forgot-password.html" class="btn btn--primary" style="margin-top:var(--space-6);width:100%">Request a new link</a>
    </div>

    <form id="reset-form" novalidate class="card" style="display:none">
      <div class="form-group">
        <label class="form-label" for="password">New password</label>
        <input class="form-input" type="password" id="password" required autocomplete="new-password" autofocus minlength="8">
        <span class="form-hint">At least 8 characters.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm">Confirm new password</label>
        <input class="form-input" type="password" id="confirm" required autocomplete="new-password">
      </div>

      <div id="form-error" class="form-error" style="margin-bottom:var(--space-4)"></div>

      <button type="submit" class="btn btn--primary" id="submit-btn" style="width:100%">Set new password</button>
    </form>

    <div id="success-card" class="card" style="display:none;text-align:center">
      <div style="font-size:2rem;margin-bottom:var(--space-4)" aria-hidden="true">✓</div>
      <h2 style="font-size:var(--text-xl);margin-bottom:var(--space-2)">Password updated</h2>
      <p style="color:var(--ir-text-muted);font-size:var(--text-sm)">Your password has been changed. You can now log in with your new password.</p>
      <a href="/login.html" class="btn btn--primary" style="margin-top:var(--space-6);width:100%">Log in</a>
    </div>
  </div>
</main>

<script type="module" src="/js/reset-password.js"></script>
</body>
</html>
