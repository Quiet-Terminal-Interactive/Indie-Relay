<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password | Indie Relay</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>

<header id="nav" role="banner"></header>

<main style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 64px);padding:var(--space-8) var(--space-6)">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:var(--space-8)">
      <img src="/images/IndieRelayLogo.png" alt="Indie Relay" style="height:48px;width:auto;margin:0 auto var(--space-4);display:block">
      <h1 style="font-size:var(--text-2xl)">Reset your password</h1>
      <p style="color:var(--ir-text-muted);margin-top:var(--space-2);font-size:var(--text-sm)">Enter your email and we'll send you a reset link.</p>
    </div>

    <form id="forgot-form" novalidate class="card">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" required autocomplete="email" autofocus>
      </div>

      <div id="form-error" class="form-error" style="margin-bottom:var(--space-4)"></div>

      <button type="submit" class="btn btn--primary" id="submit-btn" style="width:100%">Send reset link</button>

      <p style="text-align:center;margin-top:var(--space-5);font-size:var(--text-sm);color:var(--ir-text-muted)">
        <a href="/login.html">Back to log in</a>
      </p>
    </form>

    <div id="success-card" class="card" style="display:none;text-align:center">
      <div style="font-size:2rem;margin-bottom:var(--space-4)" aria-hidden="true">✉️</div>
      <h2 style="font-size:var(--text-xl);margin-bottom:var(--space-2)">Check your email</h2>
      <p style="color:var(--ir-text-muted);font-size:var(--text-sm)">If that email is registered, you'll receive a reset link shortly. It expires in 1 hour.</p>
      <a href="/login.html" class="btn btn--secondary" style="margin-top:var(--space-6);width:100%">Back to log in</a>
    </div>
  </div>
</main>

<script type="module" src="/js/forgot-password.js"></script>
</body>
</html>
