<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in | Indie Relay</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>

<header id="nav" role="banner"></header>

<main style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 64px);padding:var(--space-8) var(--space-6)">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:var(--space-8)">
      <img src="/images/IndieRelayLogo.png" alt="Indie Relay" style="height:48px;width:auto;margin:0 auto var(--space-4);display:block">
      <h1 style="font-size:var(--text-2xl)">Log in to Indie Relay</h1>
    </div>

    <form id="login-form" novalidate class="card">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" required autocomplete="email" autofocus>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" required autocomplete="current-password">
      </div>

      <div id="form-error" class="form-error" style="margin-bottom:var(--space-4)"></div>

      <button type="submit" class="btn btn--primary" id="submit-btn" style="width:100%">Log in</button>

      <p style="text-align:center;margin-top:var(--space-5);font-size:var(--text-sm);color:var(--ir-text-muted)">
        Not a member yet? <a href="/apply.html">Apply</a>
      </p>
    </form>
  </div>
</main>

<script type="module" src="/js/login.js"></script>
</body>
</html>
